<h3>Formulário TESTE</h3>

<form action="index.html" method="post">

    <label for="nome">Nome</label>
    <input type="text" name="nome" id="nome" placeholder="Nome" required>

    <label for="sobrenome">Sobrenome</label>
    <input type="text" name="sobrenome" id="sobrenome" placeholder="Sobrenome" required><br>

    <label for="email">E-mail</label>
    <input type="email" name="email" id="email" placeholder="E-mail" required>

    <label for="senha">Senha</label>
    <input type="password" minlength="8" name="senha" id="senha" placeholder="Senha (mín. 8 caracteres)" required> <br><br>

    <label for="date">Data de nascimento</label><br><br>

    <input type="date" name="date" id="date" required><br><br>
    
    <label for="genero">Gênero</label><br><br>
    
    <select name="genero" id="genero" required>
        <option value="masc">Masculino</option>
        <option value="fem">Feminino</option>
        <option value="outro">Outro</option>
    </select><br><br>

    <label for="est-civil">Estado civil</label><br><br>

    <select name="est-civil" id="est-civil" required>
        <option value="solteiro">Solteiro</option>
        <option value="casad">Casado(a)</option>
        <option value="divorc">Divorciado(a)</option>
        <option value="viuv">Viúvo(a)</option>
    </select><br><br>

    <label for="Termos">Li e aceito os <a href="termos.html">termos</a></label>
    <input type="checkbox" name="Termos" id="Termos" required><br><br>

    <input type="submit" value="Cadastre-se" required>
    
</form>
